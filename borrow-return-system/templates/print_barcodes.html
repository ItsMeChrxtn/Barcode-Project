<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ print_title }}</title>
    <style>
        * { box-sizing: border-box; }
        @page {
            size: A4 portrait;
            margin: 6mm;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #111827;
            background: #ffffff;
            padding: 12px;
        }
        .print-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .print-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .barcode-sheet-card {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 8px;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .barcode-sheet-card img {
            width: 100%;
            height: 86px;
            object-fit: contain;
            display: block;
            margin-bottom: 6px;
        }
        .barcode-title {
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .barcode-meta {
            font-size: 9px;
            line-height: 1.25;
            color: #374151;
        }
        .barcode-meta .optional-meta {
            display: none;
        }
        .print-actions button {
            border: none;
            background: #15803d;
            color: #fff;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }
        @media print {
            body {
                padding: 0;
            }
            .print-head {
                margin-bottom: 8px;
            }
            .print-head h1 {
                font-size: 14px !important;
            }
            .print-head p {
                font-size: 9px !important;
            }
            .print-actions {
                display: none;
            }
            .print-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
            }
            .barcode-sheet-card {
                border-color: #cbd5e1;
                border-radius: 6px;
                padding: 7px;
            }
            .barcode-sheet-card img {
                height: 82px;
                margin-bottom: 5px;
            }
            .barcode-title {
                font-size: 9px;
                margin-bottom: 1px;
            }
            .barcode-meta {
                font-size: 8px;
                line-height: 1.2;
            }
        }
    </style>
</head>
<body>
    <div class="print-head">
        <div>
            <h1 style="margin:0; font-size: 22px;">{{ print_title }}</h1>
            <p style="margin:6px 0 0; font-size: 12px; color:#4b5563;">{{ tools|length }} barcode(s) ready for printing</p>
        </div>
        <div class="print-actions">
            <button type="button" onclick="window.print()">Print Now</button>
        </div>
    </div>

    <div class="print-grid">
        {% for tool in tools %}
        <section class="barcode-sheet-card">
            {% if tool.barcode_image %}
            <img src="{{ url_for('static', filename='barcodes/' + tool.barcode_image) }}" alt="Barcode {{ tool.barcode }}" />
            {% endif %}
            <div class="barcode-title">{{ tool.tool_name }}</div>
            <div class="barcode-meta">
                <div><strong>Code:</strong> {{ tool.tool_code }}</div>
                <div class="optional-meta"><strong>Category:</strong> {{ tool.category }}</div>
                <div><strong>Barcode:</strong> {{ tool.barcode }}</div>
            </div>
        </section>
        {% endfor %}
    </div>
</body>
<script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get('autoprint') === '1') {
            window.setTimeout(() => {
                window.print();
            }, 250);
        }
    })();
</script>
</html>
