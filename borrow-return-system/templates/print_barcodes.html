<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ print_title }}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #111827;
            background: #ffffff;
            padding: 20px;
        }
        .print-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }
        .print-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }
        .barcode-sheet-card {
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .barcode-sheet-card img {
            width: 100%;
            height: 90px;
            object-fit: contain;
            display: block;
            margin-bottom: 10px;
        }
        .barcode-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .barcode-meta {
            font-size: 11px;
            line-height: 1.5;
            color: #374151;
        }
        .print-actions button {
            border: none;
            background: #15803d;
            color: #fff;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 600;
        }
        @media print {
            body {
                padding: 0;
            }
            .print-actions {
                display: none;
            }
            .print-grid {
                gap: 10px;
            }
            .barcode-sheet-card {
                border-color: #cbd5e1;
            }
        }
    </style>
</head>
<body>
    <div class="print-head">
        <div>
            <h1 style="margin:0; font-size: 22px;">{{ print_title }}</h1>
            <p style="margin:6px 0 0; font-size: 12px; color:#4b5563;">{{ tools|length }} barcode(s) ready for printing</p>
        </div>
        <div class="print-actions">
            <button type="button" onclick="window.print()">Print Now</button>
        </div>
    </div>

    <div class="print-grid">
        {% for tool in tools %}
        <section class="barcode-sheet-card">
            {% if tool.barcode_image %}
            <img src="{{ url_for('static', filename='barcodes/' + tool.barcode_image) }}" alt="Barcode {{ tool.barcode }}" />
            {% endif %}
            <div class="barcode-title">{{ tool.tool_name }}</div>
            <div class="barcode-meta">
                <div><strong>Code:</strong> {{ tool.tool_code }}</div>
                <div><strong>Category:</strong> {{ tool.category }}</div>
                <div><strong>Barcode:</strong> {{ tool.barcode }}</div>
            </div>
        </section>
        {% endfor %}
    </div>
</body>
</html>
