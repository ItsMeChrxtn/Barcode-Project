{% extends 'base.html' %}

{% block title %}Edit Tool | Borrow and Return Tool System{% endblock %}

{% block content %}
<div class="max-w-3xl">
    <h2 class="text-2xl font-semibold text-slate-900 tracking-tight mb-4">Edit Tool</h2>

    <form method="post" class="bg-white rounded-2xl p-5 card-soft space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Tool Name</label>
                <input type="text" name="tool_name" value="{{ tool.tool_name }}" class="input-field" required />
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Tool Code</label>
                <input type="text" value="{{ tool.tool_code }}" class="input-field bg-slate-50" readonly />
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Category</label>
                <select name="category" class="input-field" required>
                    {% for category in category_options %}
                    <option value="{{ category }}" {% if tool.category == category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Quantity</label>
                <input type="number" name="quantity" min="0" value="{{ tool.quantity }}" class="input-field" required />
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Barcode Number</label>
            <input type="text" name="barcode" value="{{ tool.barcode }}" class="input-field" required />
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Description</label>
            <textarea name="description" rows="3" class="input-field">{{ tool.description }}</textarea>
        </div>

        <div class="flex items-center gap-2">
            <button type="submit" class="btn-primary">Update Tool</button>
            <a href="{{ url_for('tools') }}" class="btn-outline">Back</a>
        </div>
    </form>
</div>
{% endblock %}
